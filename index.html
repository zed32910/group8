<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موانئ البحر المتوسط</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="icon" href="img/logo.png">
    <style>
        /* إعداد المتغيرات اللونية للوضع الفاتح (الافتراضي) والداكن */
        :root {
            --bg-body: #f4f6f8;
            --bg-sidebar: #ffffff;
            --bg-header: #f8f9fa;
            --bg-box: #ffffff;
            --bg-input: #ffffff;
            --text-main: #333333;
            --text-muted: #555555;
            --border-color: #dcdde1;
            --border-box: #e1e5e8;
            --shadow-color: rgba(0,0,0,0.05);
            --popup-bg: #ffffff;
            --popup-text: #333333;
            --btn-bg: #ffffff;
        }

        /* متغيرات الوضع الداكن (Dark Mode) */
        [data-theme="dark"] {
            --bg-body: #000000;
            --bg-sidebar: #222222;
            --bg-header: #151515;
            --bg-box: #1e1e1e;
            --bg-input: #111111;
            --text-main: #e0e0e0;
            --text-muted: #aaaaaa;
            --border-color: #333333;
            --border-box: #333333;
            --shadow-color: rgba(0,0,0,0.5);
            --popup-bg: #1e1e1e;
            --popup-text: #ffffff;
            --btn-bg: #111111;
        }

        body { 
            margin: 0; padding: 0; display: flex; 
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif; 
            height: 100vh; background-color: var(--bg-body); 
            overflow: hidden; color: var(--text-main);
            transition: all 0.3s ease;
        }

        #sidebar { 
            width: 360px; background: var(--bg-sidebar); padding: 20px; 
            box-sizing: border-box; overflow-y: auto; 
            display: flex; flex-direction: column; 
            border-left: 1px solid var(--border-color); 
            box-shadow: -2px 0 10px var(--shadow-color); z-index: 1000;
            transition: all 0.3s ease;
        }

        #map { flex-grow: 1; z-index: 1; background-color: var(--bg-body); transition: all 0.3s ease;}

        .dashboard-header { 
            background-color: var(--bg-header); padding: 15px; 
            border-bottom: 3px solid #007ac2; margin: -20px -20px 20px -20px; 
            text-align: center; transition: all 0.3s ease;
        }
        .dashboard-header h2 { margin: 0; font-size: 20px; font-weight: bold; }

        .filter-section { 
            background: var(--bg-header); padding: 15px; border-radius: 6px; 
            border: 1px solid var(--border-color); margin-bottom: 20px; transition: all 0.3s ease;
        }
        .filter-title { font-size: 14px; color: #007ac2; margin-bottom: 10px; border-bottom: 1px dashed var(--border-color); padding-bottom: 5px; font-weight: bold;}
        .filter-group { margin-bottom: 15px; }
        .filter-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; font-weight: bold;}
        
        select { 
            width: 100%; padding: 8px; background: var(--bg-input); color: var(--text-main); 
            border: 1px solid var(--border-color); border-radius: 4px; font-family: Tahoma;
        }
        
        /* تصميم صناديق الاختيار (Checkboxes) */
        .type-cb-container { display: flex; gap: 15px; margin-bottom: 10px; }
        .checkbox-container {
            max-height: 140px; overflow-y: auto; 
            border: 1px solid var(--border-color); padding: 10px; 
            background: var(--bg-box); border-radius: 4px;
        }
        .cb-label { display: flex; align-items: center; font-size: 13px; margin-bottom: 6px; color: var(--text-main); cursor: pointer; }
        .cb-label input { margin-left: 8px; cursor: pointer; }
        
        .btn-group { display: flex; gap: 5px; margin-bottom: 5px; }
        .btn-group button { 
            flex: 1; padding: 5px; font-size: 11px; cursor: pointer;
            border: 1px solid #007ac2; background: var(--btn-bg); color: #007ac2; 
            border-radius: 3px; transition: 0.2s;
        }
        .btn-group button:hover { background: #007ac2; color: #fff; }

        /* البطاقات الإحصائية */
        .stat-box { 
            background: var(--bg-box); padding: 15px; margin-bottom: 12px; 
            text-align: center; border: 1px solid var(--border-box); border-right: 4px solid #555;
            box-shadow: 0 2px 5px var(--shadow-color); border-radius: 4px; transition: all 0.3s ease;
        }
        .stat-title { font-size: 13px; color: var(--text-muted); font-weight: bold;}
        .stat-number { font-size: 34px; font-weight: bold; margin-top: 5px; }
        
        .box-all { border-right-color: #0097e6; } 
        .box-main { border-right-color: #e84118; } 
        .box-sub { border-right-color: #00a8ff; }
        .text-cyan { color: #0097e6; } 
        .text-red { color: #e84118; } 
        .text-blue { color: #00a8ff; }

        .footer-credits { margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border-color); text-align: center; }
        .footer-credits .group-name { color: #00a8ff; font-weight: bold; font-size: 18px; }

        /* النوافذ المنبثقة للخريطة */
        .port-label { background: var(--popup-bg); border: 1px solid var(--border-color); color: var(--popup-text); font-family: Tahoma; font-size: 12px; font-weight: bold; }
        .leaflet-popup-content-wrapper { background: var(--popup-bg); color: var(--popup-text); border: 1px solid var(--border-color); border-radius: 4px; text-align: right; font-family: Tahoma;}
        .leaflet-popup-tip { background: var(--popup-bg); }
        .port-icon-svg { filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4)); }


.logo{
    width: 50px;
    height: 50px;
}


/* ========================================= */
        /* --- كود التجاوب مع شاشات الموبايل (Responsive) --- */
        /* ========================================= */
        @media (max-width: 768px) {
            body {
                flex-direction: column; /* تحويل الترتيب من جانبي إلى طولي */
            }
            #sidebar {
                width: 100%; /* القائمة الجانبية تاخد عرض شاشة الموبايل بالكامل */
                max-height: 45vh; /* تاخد 45% من طول الشاشة عشان الخريطة تبان */
                border-left: none;
                border-bottom: 1px solid var(--border-color);
                box-shadow: 0 4px 10px var(--shadow-color);
                z-index: 1000;
            }
            #map {
                width: 100%;
                min-height: 55vh; /* الخريطة تاخد باقي طول الشاشة (55%) */
                flex-grow: 1;
            }
            /* تكبير الأزرار وقوائم الفلتر عشان تناسب اللمس بالأصبع */
            .filter-group select, .btn-group button {
                padding: 12px; 
                font-size: 14px;
            }
            .stat-box {
                padding: 10px; /* تقليل الفراغات توفيراً للمساحة */
            }
            .stat-number {
                font-size: 28px; /* تصغير الأرقام قليلاً لتناسب الموبايل */
            }
        }


/* ===== Loader احترافي ===== */
#loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    
    /* خلفية غامقة شفافة */
    background: rgba(0,0,0,1);
    backdrop-filter: blur(6px);

    display: flex;
    align-items: center;
    justify-content: center;
    
    z-index: 9999;
    transition: all 0.8s ease;
}

.loader-content {
    text-align: center;
    transition: all 0.8s ease;
}

/* اللوجو */
.loader-content img {
    width: 100px;
    height: 100px;
    margin-bottom: 10px;

    /* حركة احترافية */
    animation: floatLogo 2s ease-in-out infinite;
}

/* اسم الجروب */
.loader-content h3 {
    margin: 0;
    color: #fff;
    font-size: 18px;
    letter-spacing: 1px;
}

/* حركة خفيفة لفوق وتحت */
@keyframes floatLogo {
    0%   { transform: translateY(0px) scale(1); }
    50%  { transform: translateY(-10px) scale(1.05); }
    100% { transform: translateY(0px) scale(1); }
}

/* الحالة قبل الاختفاء (يطير لفوق يمين) */
#loader.hide .loader-content {
    transform: translate(300px, -300px) scale(0.5);
    opacity: 0;
}

/* اختفاء الخلفية */
#loader.hide {
    opacity: 0;
    pointer-events: none;
}
    




    </style>
</head>

        </div>
        
        <div class="filter-section">
            <div class="filter-title">إعدادات الواجهة والفلاتر</div>

                <select id="themeToggle" onchange="toggleTheme()">
                    <option value="light">الوضع الفاتح (Light)</option>
                    <option value="dark">الوضع الداكن (Dark)</option>
                </select>
            </div>

            <div class="filter-group">
                <label>تصنيف الميناء:</label>
                <div class="type-cb-container">

                    </label>
                    <label class="cb-label">
                        <input type="checkbox" id="cb-type-sub" checked onchange="applyFilters()"> موانئ فرعية
                    </label>
                </div>
            </div>

            <div class="filter-group">
                <label>الدول المحددة:</label>
                <div class="btn-group">
                    <button onclick="toggleAllCountries(true)">تحديد الكل</button>
                    <button onclick="toggleAllCountries(false)">إلغاء الكل</button>
                </div>
                <div class="checkbox-container" id="country-checkboxes">
                    </div>
            </div>
        </div>

        <div class="stat-box box-all">
            <div class="stat-title"> الموانئ الكلية</div>

        <div class="stat-box box-main">
            <div class="stat-title">الرئيسية</div>

        </div>

        <div class="stat-box box-sub">
            <div class="stat-title">الفرعية</div>
            <div class="stat-number text-blue" id="sub-ports">0</div>
        </div>

        <div class="footer-credits">
            <div class="group-name">تم التنفيذ بواسطة: جروب 8</div>
        </div>
    </div>

        // استخراج الدول وعمل Checkboxes
        var countries = [];
        rawData.forEach(function(item) {
            if(item[1] && countries.indexOf(item[1]) === -1) {
                countries.push(item[1]);
            }
        });
        countries.sort();
        
        var container = document.getElementById('country-checkboxes');
        countries.forEach(function(c) {
            var label = document.createElement('label');
            label.className = 'cb-label';
            label.innerHTML = `<input type="checkbox" class="country-cb" value="${c}" checked onchange="applyFilters()"> ${c}`;
            container.appendChild(label);
        });

        // أزرار تحديد / إلغاء الدول
        function toggleAllCountries(checkStatus) {
            var checkboxes = document.querySelectorAll('.country-cb');
            checkboxes.forEach(function(cb) {
                cb.checked = checkStatus;
            });
            applyFilters();
        }

        var mainLayerGroup = L.layerGroup().addTo(map);
        var subLayerGroup = L.layerGroup().addTo(map);

        // وظيفة الفلترة الديناميكية
        function applyFilters() {
            var showMain = document.getElementById('cb-type-main').checked;
            var showSub = document.getElementById('cb-type-sub').checked;
            
            var checkedBoxes = document.querySelectorAll('.country-cb:checked');
            var selectedCountries = Array.from(checkedBoxes).map(cb => cb.value);

            mainLayerGroup.clearLayers();
            subLayerGroup.clearLayers();
            
            var counts = { all: 0, main: 0, sub: 0 };
            var bounds = []; 

            rawData.forEach(function(item) {
                var pName = item[0], pCountry = item[1], isMain = (item[2] === 1), pLat = item[3], pLng = item[4];
                
                // تطبيق شروط الفلتر
                if (isMain && !showMain) return;
                if (!isMain && !showSub) return;
                if (selectedCountries.indexOf(pCountry) === -1) return;

                var color = isMain ? "#e84118" : "#00a8ff"; 
                var size = isMain ? 24 : 16;
                var marker = L.marker([pLat, pLng], { icon: createIcon(color, size) });

                marker.bindTooltip(pName, { className: 'port-label', direction: 'top', offset: [0, -10] });
                var typeName = isMain ? "ميناء رئيسي" : "ميناء فرعي";
                marker.bindPopup(`
                    <div style='border-bottom:1px solid var(--border-color); margin-bottom:8px; padding-bottom:8px;'>
                        <b style='color:${color}; font-size:15px;'>${pName}</b>
                    </div>
                    <b>الدولة:</b> ${pCountry}<br>
                    <b>التصنيف:</b> ${typeName}
                `);

                if(isMain) {
                    marker.addTo(mainLayerGroup);
                    counts.main++;
                } else {
                    marker.addTo(subLayerGroup);
                    counts.sub++;
                }
                counts.all++;
                bounds.push([pLat, pLng]);
            });

            // تحديث الإحصائيات
            document.getElementById('total-ports').innerText = counts.all;
            document.getElementById('main-ports').innerText = counts.main;
            document.getElementById('sub-ports').innerText = counts.sub;

            // زووم تلقائي
            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 6 });
            } else {
                map.setView([35.0, 18.0], 5);
            }
        }

        // تشغيل الفلاتر عند البداية
        applyFilters();


        window.addEventListener("load", function () {
    setTimeout(function () {
        document.getElementById("loader").classList.add("hide");
    }, 1200); // مدة العرض
});
